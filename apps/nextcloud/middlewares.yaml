---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: nextcloud-secure-headers
  namespace: nextcloud
spec:
  headers:
    forceSTSHeader: true
    stsIncludeSubdomains: true
    stsPreload: true
    stsSeconds: 31536000
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: nextcloud-redirectregex
  namespace: nextcloud
spec:
  redirectRegex:
    permanent: true
    regex: https://(.*)/.well-known/(?:card|cal)dav
    replacement: https://${1}/remote.php/dav
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: nextcloud-chain
  namespace: nextcloud
spec:
  chain:
    middlewares:
      - name: nextcloud-secure-headers
      - name: nextcloud-redirectregex
