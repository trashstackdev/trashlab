---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: kube-system
spec:
  upgrade:
    crds: CreateReplace
  chart:
    spec:
      chart: traefik
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: flux-system
      version: 39.0.7
  interval: 1m0s
  releaseName: traefik
  values:
    api:
      insecure: true
    metrics:
      prometheus:
        entryPoint: metrics
    ports:
      metrics:
        port: 9100
        expose:
          default: false
    providers:
      kubernetesCRD:
        allowCrossNamespace: true
